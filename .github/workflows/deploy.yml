name: CI/CD Pipeline

on:
  push:
    branches: [master, Development-1]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: "22"
  SERVICE_PATH: services/card-data-services
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json
      - run: cd ${{ env.SERVICE_PATH }} && npm ci
      - run: cd ${{ env.SERVICE_PATH }} && npm audit --audit-level=high || true
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json
      - run: cd ${{ env.SERVICE_PATH }} && npm ci
      - run: cd ${{ env.SERVICE_PATH }} && npm test
        env:
          NODE_OPTIONS: --experimental-vm-modules
          JWT_API_KEY_SECRET: ${{secrets.JWT_API_KEY_SECRET}}

  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-railway:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: |
          cd ${{ env.SERVICE_PATH }}
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Verify Deployment
        run: |
          sleep 15
          curl -f https://${{ vars.RAILWAY_PROJECT }}.up.railway.app/health || exit 1

  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-railway
    steps:
      - name: Run Smoke Tests
        run: |
          URL="https://${{ vars.RAILWAY_PROJECT }}.up.railway.app"
          echo "Testing health..."
          curl -f $URL/health || exit 1
          echo "Testing search..."
          curl -f "$URL/api/search?name=pikachu&pageSize=1" || exit 1
          echo "Testing sets..."
          curl -f $URL/api/sets || exit 1
          echo "✅ All smoke tests passed!"
